```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Space Shooting ULTRA PRO</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; margin:auto; background:black; }
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>
<audio id="bgm" src="bgm.mp3" loop></audio>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const bgm = document.getElementById("bgm");

let player, bullets, enemies, explosions, score, keys;
let enemyBullets=[], combo=0;
let gameState, countdown=3, countdownTimer;
let spawnCount = 0;
let screenShake=0;

// ===== 星空 =====
let stars=[];
for(let i=0;i<120;i++){
 stars.push({x:Math.random()*400,y:Math.random()*600,size:Math.random()*2,speed:1+Math.random()*2});
}

// ===== 星雲 =====
let nebula=[];
for(let i=0;i<8;i++){
 nebula.push({x:Math.random()*400,y:Math.random()*600,r:80+Math.random()*120});
}

// ===== 流星 =====
let meteors=[];
setInterval(()=>{
 meteors.push({x:Math.random()*400,y:-50,speed:6});
},3000);

// ===== ハイスコア =====
let highScore = localStorage.getItem("highscore") || 0;

function init(){
 player = { x:180, y:520, speed:5, life:3 };
 bullets = [];
 enemies = [];
 explosions = [];
 enemyBullets=[];
 combo=0;
 score = 0;
 keys = {};
 gameState = "title";
 spawnCount = 0;
}
init();

document.addEventListener("keydown", e=>{
 keys[e.code] = true;

 if(gameState==="title" && e.code==="Space"){
  startCountdown();
  bgm.play();
 }

 if(gameState==="playing" && e.code==="Space"){
  bullets.push({x:player.x+20, y:player.y});
 }

 if(gameState==="gameover" && e.code==="KeyR") init();
});

document.addEventListener("keyup", e=> keys[e.code]=false);

// ===== スマホ操作 =====
canvas.addEventListener("touchmove",e=>{
 const rect=canvas.getBoundingClientRect();
 player.x=e.touches[0].clientX-rect.left-20;
});

canvas.addEventListener("touchstart",()=>{
 bullets.push({x:player.x+20,y:player.y});
});

function startCountdown(){
 gameState="countdown";
 countdown=3;

 countdownTimer=setInterval(()=>{
  countdown--;
  if(countdown<=0){
   clearInterval(countdownTimer);
   gameState="playing";
  }
 },1000);
}

// ===== 敵生成 =====
setInterval(()=>{
 if(gameState==="playing"){
  spawnCount++;
  if(spawnCount%5===0){
   enemies.push({x:80,y:-120,w:240,h:100,speed:1.2,hp:4,type:"boss",laser:0});
  } else {
   enemies.push({x:Math.random()*360,y:-40,w:40,h:40,speed:2+Math.random()*2,hp:1,type:"normal"});
  }
 }
},1000);

function update(){

 if(gameState!=="playing") return;

 if(keys["ArrowLeft"] && player.x>0) player.x-=player.speed;
 if(keys["ArrowRight"] && player.x<360) player.x+=player.speed;

 bullets.forEach((b,i)=>{
  b.y-=8;
  if(b.y<0) bullets.splice(i,1);
 });

 enemies.forEach((e,ei)=>{
  e.y+=e.speed;

  if(Math.random()<0.02){
   enemyBullets.push({x:e.x+e.w/2,y:e.y+e.h});
  }

  if(e.type==="boss"){
   e.laser+=0.02;
  }

  bullets.forEach((b,bi)=>{
   if(b.x>e.x && b.x<e.x+e.w && b.y>e.y && b.y<e.y+e.h){

    e.hp--;
    bullets.splice(bi,1);

    if(e.hp<=0){
     explosions.push({x:e.x+e.w/2,y:e.y+e.h/2,r:0,big:true});
     enemies.splice(ei,1);

     combo++;
     score+=combo;

     screenShake=10;
    }

   }
  });

 });

 enemyBullets.forEach((b,i)=>{

  b.y+=4;
  if(b.y>600) enemyBullets.splice(i,1);

  if(b.x>player.x && b.x<player.x+40 && b.y>player.y){

   player.life--;
   enemyBullets.splice(i,1);
   combo=0;

   if(player.life<=0){
    gameState="gameover";
   }

  }

 });

 explosions.forEach((ex,i)=>{
  ex.r+=5;
  if(ex.r>60) explosions.splice(i,1);
 });

 if(score>highScore){
  highScore=score;
  localStorage.setItem("highscore",highScore);
 }

 if(screenShake>0) screenShake--;

}

// ===== 自機 =====
function drawPlayer(){

 ctx.shadowColor="cyan";
 ctx.shadowBlur=20;

 let float=Math.sin(Date.now()*0.006)*2;

 ctx.fillStyle="#00eaff";
 ctx.beginPath();
 ctx.moveTo(player.x+20,player.y+float);
 ctx.lineTo(player.x+5,player.y+45+float);
 ctx.lineTo(player.x+35,player.y+45+float);
 ctx.closePath();
 ctx.fill();

 ctx.fillStyle="white";
 ctx.beginPath();
 ctx.arc(player.x+20,player.y+15+float,6,0,Math.PI*2);
 ctx.fill();

 let flame=10+Math.random()*10;

 ctx.fillStyle="cyan";
 ctx.beginPath();
 ctx.moveTo(player.x+15,player.y+45+float);
 ctx.lineTo(player.x+25,player.y+45+float);
 ctx.lineTo(player.x+20,player.y+45+flame+float);
 ctx.closePath();
 ctx.fill();

 ctx.shadowBlur=0;
}

// ===== 敵 =====
function drawEnemy(e){

 let float=Math.sin(Date.now()*0.004+e.x)*4;

 if(e.type==="normal"){

  ctx.fillStyle="#aa0000";
  ctx.fillRect(e.x+10,e.y+float,20,40);

 }else{

  ctx.fillStyle="#330066";
  ctx.fillRect(e.x,e.y+float,e.w,e.h);

  ctx.fillStyle="magenta";
  ctx.beginPath();
  ctx.arc(e.x+e.w/2,e.y+e.h/2+float,15,0,Math.PI*2);
  ctx.fill();

  if(e.laser>1){
   ctx.strokeStyle="red";
   ctx.lineWidth=6;

   ctx.beginPath();
   ctx.moveTo(e.x+e.w/2,e.y+e.h);
   ctx.lineTo(e.x+e.w/2,600);
   ctx.stroke();
  }

 }

}

function draw(){

 ctx.save();

 if(screenShake){
  ctx.translate(Math.random()*screenShake-screenShake/2,
                Math.random()*screenShake-screenShake/2);
 }

 ctx.clearRect(0,0,400,600);

// 星雲
nebula.forEach(n=>{
 let g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
 g.addColorStop(0,"rgba(120,0,200,0.4)");
 g.addColorStop(1,"rgba(0,0,0,0)");

 ctx.fillStyle=g;
 ctx.beginPath();
 ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
 ctx.fill();
});

// 星空
stars.forEach(s=>{
 ctx.fillStyle="white";
 ctx.fillRect(s.x,s.y,s.size,s.size);

 s.y+=s.speed;
 if(s.y>600){
  s.y=0;
  s.x=Math.random()*400;
 }
});

// 流星
meteors.forEach((m,i)=>{
 ctx.strokeStyle="white";
 ctx.beginPath();
 ctx.moveTo(m.x,m.y);
 ctx.lineTo(m.x+20,m.y+40);
 ctx.stroke();

 m.y+=m.speed;

 if(m.y>600) meteors.splice(i,1);
});

 if(gameState==="title"){
  ctx.fillStyle="white";
  ctx.font="28px Arial";
  ctx.fillText("SPACE SHOOTING ULTRA PRO",20,250);
  ctx.font="20px Arial";
  ctx.fillText("Press SPACE",120,300);
  return;
 }

 if(gameState==="countdown"){
  ctx.fillStyle="white";
  ctx.font="80px Arial";
  ctx.fillText(countdown,180,320);
  return;
 }

 drawPlayer();

 bullets.forEach(b=>{
  ctx.shadowColor="cyan";
  ctx.shadowBlur=10;
  ctx.fillStyle="cyan";
  ctx.fillRect(b.x,b.y,5,12);
  ctx.shadowBlur=0;
 });

 enemyBullets.forEach(b=>{
  ctx.fillStyle="orange";
  ctx.fillRect(b.x,b.y,4,10);
 });

 enemies.forEach(e=>drawEnemy(e));

 explosions.forEach(ex=>{
  let g=ctx.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,ex.r);
  g.addColorStop(0,"white");
  g.addColorStop(0.3,"yellow");
  g.addColorStop(0.6,"orange");
  g.addColorStop(1,"red");

  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2);
  ctx.fill();
 });

 ctx.fillStyle="white";
 ctx.font="18px Arial";
 ctx.fillText("Score: "+score,10,25);
 ctx.fillText("Combo: "+combo,10,45);
 ctx.fillText("Life: "+player.life,10,65);
 ctx.fillText("HighScore: "+highScore,10,85);

 if(gameState==="gameover"){
  ctx.font="40px Arial";
  ctx.fillText("GAME OVER",90,300);
  ctx.font="20px Arial";
  ctx.fillText("Press R",150,340);
 }

 ctx.restore();
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
```
