<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Higashi Profile</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* 背景アニメーション */
@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* カード */
.card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 40px;
  width: 360px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,255,255,0.4);
  animation: fadeIn 1.5s ease;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 60px rgba(0,255,255,0.8);
}

/* 登場アニメ */
@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.8);}
  to {opacity: 1; transform: scale(1);}
}

.profile-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid cyan;
  margin-bottom: 20px;
}

/* ネオン点滅 */
h1 {
  margin: 10px 0;
  font-size: 28px;
  letter-spacing: 2px;
  color: cyan;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px cyan; }
  to { text-shadow: 0 0 25px cyan, 0 0 40px cyan; }
}

.role {
  color: #00ffff;
  margin-bottom: 20px;
}

.info {
  text-align: left;
  margin-top: 20px;
}

.info p {
  margin: 8px 0;
}

.social a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
  font-size: 20px;
  transition: 0.3s;
}

.social a:hover {
  color: cyan;
  transform: scale(1.2);
}
</style>
</head>

<body>

<div class="card">
  <img src="https://via.placeholder.com/120" class="profile-img">
  <h1>東 (Higashi)</h1>
  <div class="role">Student / Future Creator</div>

  <div class="info">
    <p>🔥 興味: プログラミング / 英語 / 数学</p>
    <p>😴 趣味: 寝ること</p>
    <p>📍 Tokyo, Japan</p>
  </div>

  <div class="social">
    <a href="#">X</a>
    <a href="#">GitHub</a>
    <a href="#">Instagram</a>
  </div>
</div>

</body>
</html>
